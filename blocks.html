<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tenderfy — Super Admin · Blocks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400,0..1,0&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="admin.css">
<link rel="stylesheet" href="components.css">
</head>
<body data-page="blocks" data-title="Blocks">
<div id="app-content">
  <div class="pad">
    <div class="pg-head">
      <div>
        <div class="tn-title">Blocks</div>
        <div class="pg-sub">The content building-blocks behind Tenderfy's <strong>Block Builder</strong>. The goal is one shared set for every client — anything tagged <strong>Bespoke</strong> still needs standardising.</div>
      </div>
      <div class="pg-acts">
        <a class="btn btn-outline btn-sm" id="stdBtn" style="display:none"></a>
        <a class="btn btn-primary btn-sm" href="block-edit.html"><span class="ms" style="font-size:18px">add</span> Create Custom Block</a>
      </div>
    </div>

    <div class="blk-tabs" id="tabs"></div>
    <div class="blk-grid" id="grid"></div>
  </div>
</div>
<script src="shell.js"></script>
<script src="blocks-data.js"></script>
<script>
function pageInit(){
  const cats=['All Blocks', ...BLOCK_CATS];
  let active='All Blocks';

  function bespokeCount(){ return BLOCKS.filter(b=>b.bespoke).length; }
  function renderStdBtn(){
    const n=bespokeCount(), btn=document.getElementById('stdBtn');
    if(!n){ btn.style.display='none'; return; }
    btn.style.display='';
    btn.innerHTML=`<span class="ms" style="font-size:17px">published_with_changes</span> Standardise ${n} bespoke`;
  }
  function renderTabs(){
    document.getElementById('tabs').innerHTML=cats.map(c=>`<span class="blk-tab ${c===active?'on':''}" data-cat="${c}">${c}</span>`).join('');
    document.querySelectorAll('#tabs .blk-tab').forEach(t=>t.addEventListener('click',()=>{active=t.dataset.cat;renderTabs();renderGrid();}));
  }
  function renderGrid(){
    const list=BLOCKS.filter(b=>active==='All Blocks'||b.cat===active);
    document.getElementById('grid').innerHTML=list.map(b=>`
      <a class="blk-card" href="block-edit.html#id=${b.id}">
        <div class="blk-name">${b.label} ${b.bespoke?'<span class="blk-custom">Bespoke</span>':''}</div>
        <div class="blk-preview">${blockPreview(b.p)}</div>
        <div style="font-size:12px;color:var(--gray);padding-top:11px">${b.desc}</div>
      </a>`).join('');
  }
  document.getElementById('stdBtn').addEventListener('click',()=>{
    const gaps=BLOCKS.filter(b=>b.bespoke);
    if(!gaps.length) return;
    confirmAction({title:`Standardise ${gaps.length} blocks?`,body:`${gaps.map(g=>g.label).join(', ')} will be made available to every client, so one block builder covers the whole customer base.`,confirm:'Standardise'},()=>{
      gaps.forEach(b=>b.bespoke=false); renderGrid(); renderStdBtn(); showToast(`Standardised ${gaps.length} blocks across all clients`);
    });
  });

  renderTabs(); renderGrid(); renderStdBtn();
}
</script>
</body>
</html>
