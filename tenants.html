<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tenderfy — Super Admin · Clients</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400,0..1,0&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="admin.css">
<link rel="stylesheet" href="components.css">
</head>
<body data-page="tenants" data-title="Clients">
<div id="app-content">
  <div class="pad">
    <div class="pg-head">
      <div>
        <div class="tn-title">Clients</div>
        <div class="pg-sub">Client companies on the platform. Each holds a <strong>Brand Kit</strong> that is auto-applied to any template assigned to it.</div>
      </div>
      <div class="pg-acts">
        <a class="btn btn-primary btn-sm" data-toast="Register a new client"><span class="ms" style="font-size:18px">add</span> New Client</a>
      </div>
    </div>

    <div class="pg-toolbar">
      <span class="psearch"><span class="ms">search</span><input id="q" type="text" placeholder="Search clients…"></span>
    </div>

    <table class="dtable">
      <thead><tr><th>Client</th><th>Industry</th><th>Brand kit</th><th>Templates</th><th>Font</th><th></th></tr></thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
</div>
<script src="shell.js"></script>
<script src="tenant-data.js"></script>
<script>
function pageInit(){
  let query='';
  function render(){
    const list=TENANTS.filter(t=>!query||t.name.toLowerCase().includes(query));
    document.getElementById('rows').innerHTML=list.map(t=>`
      <tr onclick="location.href='tenant-detail.html#id=${t.id}'">
        <td><div class="hstack"><span class="ta" style="width:34px;height:34px;border-radius:8px;background:var(--teal-tint);color:var(--teal);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700">${t.initials}</span><span class="nm">${t.name}</span></div></td>
        <td class="muted">${t.industry}</td>
        <td><span class="brand-swatch" style="background:${t.brand.primary}"></span> <span class="brand-swatch" style="background:${t.brand.secondary}"></span></td>
        <td>${t.templates ? t.templates+' assigned' : '<span class="muted">None yet</span>'}</td>
        <td class="muted">${t.brand.font}</td>
        <td style="text-align:right"><span class="ms muted">chevron_right</span></td>
      </tr>`).join('');
  }
  render();
  document.getElementById('q').addEventListener('input',e=>{query=e.target.value.toLowerCase().trim();render();});
}
</script>
</body>
</html>
